<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專屬電子賀函</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* 整個頁面強迫滿版置中 */
    body {
      background-color: #f0eef6;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      perspective: 1000px;
    }

    /* 信封外部框架 - 初始狀態鎖定螢幕正中央 */
    .envelope-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 220px;
      background-color: #d9534f;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 信封蓋子 */
    .lid {
      position: absolute;
      top: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid #c9302c;
      transform-origin: top;
      transition: transform 0.6s ease-in-out;
      z-index: 3;
    }

    /* 信封口袋 */
    .pocket {
      position: absolute;
      bottom: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid #e6645d;
      border-right: 160px solid #e6645d;
      border-bottom: 110px solid #d9534f;
      border-top: 110px solid transparent;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 2;
    }

    /* 卡片主體 */
    .card {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 300px;
      height: 380px;
      background-color: transparent;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
      overflow: hidden;
      transform: translateY(0);
    }

    /* 圖片完整呈現 */
    .card-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    /* 貴賓姓名 */
    .recipient-name {
      position: absolute;
      top: 25px;
      left: 20px;
      right: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      text-align: left;
      z-index: 2;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    /* 點擊提示 */
    .click-hint {
      position: absolute;
      bottom: -40px;
      width: 100%;
      text-align: center;
      color: #666;
      font-size: 14px;
      transition: opacity 0.3s;
    }

    /* --- 開啟狀態 (精準垂直居中) --- */
    
    /* 打開時，讓信封整體適度向下位移 (+90px)，平衡頂部彈出的卡片，讓整體維持在網頁最正中央 */
    .envelope-wrapper.open {
      transform: translate(-50%, calc(-50% + 90px));
    }

    .envelope-wrapper.open .lid {
      transform: rotateX(180deg);
      z-index: 0;
    }

    /* 卡片微抽，剛好完美蓋在信封上 */
    .envelope-wrapper.open .card {
      transform: translateY(-90px) scale(1.02);
      z-index: 4;
    }

    .envelope-wrapper.open .click-hint {
      opacity: 0;
    }
  </style>
</head>
<body>

  <!-- 純粹熱烈群眾掌聲音效 (無歡呼/無耶聲) -->
  <audio id="applauseSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

  <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
    <div class="lid"></div>
    <div class="pocket"></div>
    
    <div class="card">
      <div class="recipient-name" id="nameTag">親愛的貴賓：</div>
      <img src="card.jpg" class="card-bg" alt="賀函圖片">
    </div>

    <div class="click-hint">▲ 點擊信封開啟賀函 ▲</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name');

    if (rawName) {
      document.getElementById('nameTag').innerText = decodeURIComponent(rawName) + ' 您好：';
    }

    function openEnvelope() {
      // 播放純掌聲
      const sound = document.getElementById('applauseSound');
      if (sound) {
        sound.currentTime = 0;
        sound.play().catch(e => console.log('Audio play blocked:', e));
      }
      
      document.getElementById('envelope').classList.add('open');
    }
  </script>
</body>
</html>
