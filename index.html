<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 專屬電子賀函生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: radial-gradient(circle at center, #1a1c2e 0%, #0f101d 100%);
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      perspective: 1000px;
    }

    /* 信封外部框架 (偏下佈局) */
    .envelope-wrapper {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 220px;
      background-color: #d9534f;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      box-shadow: 0 0 30px rgba(217, 83, 79, 0.4), 0 15px 35px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.8s ease;
    }

    .lid {
      position: absolute;
      top: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid #c9302c;
      transform-origin: top;
      transition: transform 0.6s ease-in-out;
      z-index: 3;
    }

    .pocket {
      position: absolute;
      bottom: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid #e6645d;
      border-right: 160px solid #e6645d;
      border-bottom: 110px solid #d9534f;
      border-top: 110px solid transparent;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 2;
    }

    .card {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 300px;
      height: 380px;
      background-color: transparent;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
      overflow: hidden;
      transform: translateY(0);
    }

    .card-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    /* 方案 B：AI 霓虹金屬遮罩框 (精準涵蓋原圖文字) */
    .name-mask-box {
      position: absolute;
      top: 25px;
      left: 15px;
      right: 15px;
      background: linear-gradient(135deg, rgba(15, 16, 29, 0.95) 0%, rgba(35, 20, 50, 0.95) 100%);
      border: 2px solid #ffd700;
      box-shadow: 0 0 12px rgba(0, 242, 254, 0.8), inset 0 0 8px rgba(255, 215, 0, 0.5);
      border-radius: 8px;
      padding: 6px 12px;
      z-index: 3;
      text-align: left;
    }

    .ai-tag {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #00f2fe;
      text-transform: uppercase;
      margin-bottom: 2px;
      text-shadow: 0 0 6px rgba(0, 242, 254, 0.8);
    }

    .recipient-name {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 5px #ffd700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .click-hint {
      position: absolute;
      bottom: -40px;
      width: 100%;
      text-align: center;
      color: #00f2fe;
      font-size: 13px;
      letter-spacing: 1px;
      transition: opacity 0.3s;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    /* 開啟狀態 */
    .envelope-wrapper.open {
      transform: translate(-50%, calc(-50% + 40px));
      box-shadow: 0 0 50px rgba(0, 242, 254, 0.5), 0 15px 35px rgba(0,0,0,0.6);
    }

    .envelope-wrapper.open .lid {
      transform: rotateX(180deg);
      z-index: 0;
    }

    .envelope-wrapper.open .card {
      transform: translateY(-130px) scale(1.02);
      z-index: 4;
    }

    .envelope-wrapper.open .click-hint {
      opacity: 0;
    }

    /* 底部 AI 姓名輸入控制列 */
    .input-box-container {
      position: fixed;
      bottom: 20px;
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 8px 12px;
      border-radius: 30px;
      border: 1px solid rgba(0, 242, 254, 0.3);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
      z-index: 10;
    }

    .name-input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      padding: 6px 10px;
      width: 150px;
    }

    .name-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .generate-btn {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .generate-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
    }

    /* 彩帶粒子 */
    .confetti-particle {
      position: fixed;
      width: 8px;
      height: 12px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 2px;
      animation: confettiFall 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes confettiFall {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(720deg) scale(0.5); }
    }

    /* 煙火火花粒子 */
    .firework-spark {
      position: fixed;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      z-index: 9998;
      pointer-events: none;
      animation: fireworkExplode 1.2s ease-out forwards;
    }

    @keyframes fireworkExplode {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(0.2); }
    }
  </style>
</head>
<body>

  <!-- 最炫民族風音樂（副歌高潮段落） -->
  <audio id="bgMusic" src="https://m801.com/sing/zuixuanminzufeng.mp3" preload="auto" loop></audio>

  <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
    <div class="lid"></div>
    <div class="pocket"></div>
    
    <div class="card">
      <!-- 方案 B 質感遮罩框 -->
      <div class="name-mask-box">
        <div class="ai-tag">✦ AI Personalized Card</div>
        <div class="recipient-name" id="nameTag">信義店 您好：</div>
      </div>
      <img src="card.jpg" class="card-bg" alt="賀函圖片">
    </div>

    <div class="click-hint">✦ 點擊信封 開啟 AI 賀函 ✦</div>
  </div>

  <!-- 底部 AI 姓名輸入控制列 -->
  <div class="input-box-container">
    <input type="text" id="customName" class="name-input" placeholder="輸入店名或姓名...">
    <button class="generate-btn" onclick="updateName()">生成卡片</button>
  </div>

  <script>
    // 統一處理名字格式顯示的函式
    function formatDisplayName(text) {
      if (!text) return '信義店 您好：';
      // 移除可能重複輸入的「您好：」或「您好」
      let cleanText = text.replace(/您好[：:]?/g, '').trim();
      return cleanText + ' 您好：';
    }

    // 頁面載入時解析 URL 參數
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name');

    if (rawName) {
      document.getElementById('nameTag').innerText = formatDisplayName(decodeURIComponent(rawName));
    }

    let isOpened = false;

    function openEnvelope() {
      if (!isOpened) {
        const music = document.getElementById('bgMusic');
        if (music) {
          music.currentTime = 52;
          music.volume = 1.0;
          music.play().catch(e => console.log('Audio blocked:', e));
        }

        document.getElementById('envelope').classList.add('open');
        startContinuousEffects();
        isOpened = true;
      }
    }

    function updateName() {
      const inputVal = document.getElementById('customName').value.trim();
      if (inputVal) {
        const formattedName = formatDisplayName(inputVal);
        document.getElementById('nameTag').innerText = formattedName;
        
        // 同步更新 URL 保持一致
        const cleanNameOnly = inputVal.replace(/您好[：:]?/g, '').trim();
        const newUrl = window.location.pathname + '?name=' + encodeURIComponent(cleanNameOnly);
        window.history.pushState({path: newUrl}, '', newUrl);
      }
    }

    // 持續循環放彩帶與煙火
    function startContinuousEffects() {
      spawnConfettiBatch();
      spawnFireworkBatch();

      setInterval(() => {
        spawnConfettiBatch();
      }, 1200);

      setInterval(() => {
        spawnFireworkBatch();
      }, 800);
    }

    function spawnConfettiBatch() {
      const colors = ['#ffd700', '#e0e0e0', '#00f2fe', '#4facfe', '#ffffff', '#ff007f', '#ff5722'];
      const count = 30;

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'confetti-particle';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        const startX = window.innerWidth / 2 + (Math.random() * 200 - 100);
        const startY = window.innerHeight / 2 - 20;
        particle.style.left = startX + 'px';
        particle.style.top = startY + 'px';

        const angle = Math.random() * Math.PI * 2;
        const distance = 150 + Math.random() * 250;
        const dx = Math.cos(angle) * distance + 'px';
        const dy = (Math.sin(angle) * distance - 100) + 'px';

        particle.style.setProperty('--dx', dx);
        particle.style.setProperty('--dy', dy);

        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 2500);
      }
    }

    function spawnFireworkBatch() {
      const colors = ['#ff0055', '#00f2fe', '#ffcc00', '#00ff88', '#ffffff', '#ff9900'];
      
      const center = {
        x: window.innerWidth * (0.15 + Math.random() * 0.7),
        y: window.innerHeight * (0.15 + Math.random() * 0.4)
      };

      for (let i = 0; i < 35; i++) {
        const spark = document.createElement('div');
        spark.className = 'firework-spark';
        spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        spark.style.boxShadow = `0 0 8px ${spark.style.backgroundColor}`;
        spark.style.left = center.x + 'px';
        spark.style.top = center.y + 'px';

        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 110;
        const fx = Math.cos(angle) * speed + 'px';
        const fy = Math.sin(angle) * speed + 'px';

        spark.style.setProperty('--fx', fx);
        spark.style.setProperty('--fy', fy);

        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 1200);
      }
    }
  </script>
</body>
</html>
