<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專屬電子賀函</title>
  <style>
    /* 基本重設與垂直水平置中 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #f0eef6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
      perspective: 1000px;
    }

    /* 信封外部框架 (加上動態位移平滑過渡) */
    .envelope-wrapper {
      position: relative;
      width: 320px;
      height: 220px;
      background-color: #d9534f;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      /* 確保打開時的移動更平滑 */
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 信封蓋子 */
    .lid {
      position: absolute;
      top: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid #c9302c;
      transform-origin: top;
      transition: transform 0.6s ease-in-out;
      z-index: 3;
    }

    /* 信封口袋 */
    .pocket {
      position: absolute;
      bottom: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid #e6645d;
      border-right: 160px solid #e6645d;
      border-bottom: 110px solid #d9534f;
      border-top: 110px solid transparent;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 2;
    }

    /* 卡片主體 - 背景透明，完美融入圖片 */
    .card {
      position: absolute;
      bottom: 10px; /* 初始在信封內部的深度 */
      left: 10px;
      width: 300px;
      height: 400px; /* 稍微縮短高度，更像從信封抽出來 */
      background-color: transparent; /* 背景透明 */
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      overflow: hidden;
      transform: translateY(0);
    }

    /* 卡片背景圖片 - 完整顯示 */
    .card-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    /* 貴賓姓名 */
    .recipient-name {
      position: absolute;
      top: 30px;
      left: 20px;
      right: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      text-align: left;
      z-index: 2;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    /* 點擊提示 */
    .click-hint {
      position: absolute;
      bottom: -40px;
      width: 100%;
      text-align: center;
      color: #666;
      font-size: 14px;
      transition: opacity 0.3s;
    }

    /* --- 開啟狀態 (黃金視覺中心) --- */

    /* 信封整體稍微下移，為蓋子翻開和卡片騰出空间，保持視覺平衡 */
    .envelope-wrapper.open {
      transform: translateY(50px);
    }

    /* 信封蓋子翻開 */
    .envelope-wrapper.open .lid {
      transform: rotateX(180deg);
      z-index: 0; /* 翻開後跑到卡片後面 */
    }

    /* 卡片彈出至精準位置：剛好覆蓋在信封上方 */
    .envelope-wrapper.open .card {
      /* 核心修正：調整 translateY 的數值，讓卡片底部剛好在信封上邊緣 */
      transform: translateY(-210px);
      z-index: 4; /* 彈出後要在最前面 */
    }

    /* 提示文字隱藏 */
    .envelope-wrapper.open .click-hint {
      opacity: 0;
    }
  </style>
</head>
<body>

  <!-- 更穩定的免費開信封/紙張音效來源 -->
  <audio id="openSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

  <!-- 信封主體 -->
  <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
    <div class="lid"></div>
    <div class="pocket"></div>
    
    <!-- 內含的卡片 -->
    <div class="card">
      <div class="recipient-name" id="nameTag">親愛的貴賓：</div>
      <!-- 讀取上傳的 card.jpg -->
      <img src="card.jpg" class="card-bg" alt="賀函圖片">
    </div>

    <div class="click-hint">▲ 點擊信封開啟賀函 ▲</div>
  </div>

  <script>
    // 自動取得網址帶入的賓客名字 (?name=張總裁)
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name');

    if (rawName) {
      document.getElementById('nameTag').innerText = decodeURIComponent(rawName) + ' 您好：';
    }

    let isOpened = false; // 增加一個狀態旗標

    // 點擊信封後的處理函數
    function openEnvelope() {
      if (!isOpened) {
        // 1. 嘗試播放音效
        const sound = document.getElementById('openSound');
        
        // 確保音效載入並嘗試播放，捕捉可能的權限錯誤
        sound.play().then(() => {
          console.log("音效播放成功");
        }).catch(error => {
          console.log("音效播放被瀏覽器阻擋，通常需要使用者先有互動。即使這次沒聲音，卡片動畫仍會進行。", error);
        });

        // 2. 執行開啟動畫
        document.getElementById('envelope').classList.add('open');
        
        isOpened = true; // 標記為已開啟，防止重複點擊觸發
      }
    }
  </script>
</body>
</html>
