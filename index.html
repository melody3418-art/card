<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專屬電子賀函</title>
  <style>
    /* 基本設定 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #f0eef6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
      perspective: 1000px; /* 增加立體感 */
    }

    /* 信封外部框架 */
    .envelope-wrapper {
      position: relative;
      width: 320px;
      height: 220px;
      background-color: #d9534f;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.3s;
    }

    /* 信封蓋子 */
    .lid {
      position: absolute;
      top: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid #c9302c;
      transform-origin: top;
      transition: transform 0.6s ease-in-out;
      z-index: 3;
    }

    /* 信封口袋 */
    .pocket {
      position: absolute;
      bottom: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid #e6645d;
      border-right: 160px solid #e6645d;
      border-bottom: 110px solid #d9534f;
      border-top: 110px solid transparent;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 2;
    }

    /* 卡片主體 - 核心修正點：高度與動畫 */
    .card {
      position: absolute;
      bottom: 10px; /* 原始在信封內的位置 */
      left: 10px;
      width: 300px;
      height: 480px; /* 1. 增加卡片框架高度，適應直式圖片 */
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      /* 2. 核心修正：加大彈出的距離 (-350px)，確保完全彈出 */
      transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 1;
      overflow: hidden;
      transform: translateY(0); /* 初始狀態 */
    }

    /* 卡片背景圖片 - 核心修正點：完整顯示 */
    .card-bg {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 3. 確保圖片完整顯示，不裁切 */
      object-position: center;
      display: block;
    }

    /* 貴賓姓名 */
    .recipient-name {
      position: absolute;
      top: 40px; /* 名字顯示的高度 */
      left: 20px;
      right: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
      text-align: left;
      z-index: 2;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    /* 點擊提示 */
    .click-hint {
      position: absolute;
      bottom: -50px;
      width: 100%;
      text-align: center;
      color: #666;
      font-size: 14px;
      transition: opacity 0.3s;
    }

    /* --- 開啟狀態的樣式 --- */

    /* 信封蓋子打開 */
    .envelope-wrapper.open .lid {
      transform: rotateX(180deg);
      z-index: 0; /* 打開後跑到卡片後面 */
    }

    /* 卡片完全彈出 */
    .envelope-wrapper.open .card {
      /* 核心修正：同時向上移動 (-350px) 並略為放大，確保完全呈現 */
      transform: translateY(-350px) scale(1.05);
      z-index: 4; /* 彈出後要在最前面 */
    }

    /* 點擊提示消失 */
    .envelope-wrapper.open .click-hint {
      opacity: 0;
    }
  </style>
</head>
<body>

  <!-- 信封主體 -->
  <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
    <div class="lid"></div>
    <div class="pocket"></div>
    
    <!-- 內含的卡片 -->
    <div class="card">
      <div class="recipient-name" id="nameTag">親愛的貴賓：</div>
      <!-- 讀取上傳的 card.jpg -->
      <img src="card.jpg" class="card-bg" alt="賀函圖片">
    </div>

    <div class="click-hint">▲ 點擊信封開啟賀函 ▲</div>
  </div>

  <script>
    // 取得網址中的名字參數
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name');

    // 如果網址有名字，就替換掉預設文字
    if (rawName) {
      document.getElementById('nameTag').innerText = decodeURIComponent(rawName) + ' 您好：';
    }

    // 點擊信封後加入 'open' 樣式類別
    function openEnvelope() {
      document.getElementById('envelope').classList.add('open');
    }
  </script>
</body>
</html>
</html>
