<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專屬電子賀函</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: #f0eef6;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      perspective: 1000px;
    }

    /* 信封外部框架 */
    .envelope-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 220px;
      background-color: #d9534f;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 信封蓋子 */
    .lid {
      position: absolute;
      top: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid #c9302c;
      transform-origin: top;
      transition: transform 0.6s ease-in-out;
      z-index: 3;
    }

    /* 信封口袋 */
    .pocket {
      position: absolute;
      bottom: 0; left: 0; width: 0; height: 0;
      border-left: 160px solid #e6645d;
      border-right: 160px solid #e6645d;
      border-bottom: 110px solid #d9534f;
      border-top: 110px solid transparent;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 2;
    }

    /* 卡片主體 */
    .card {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 300px;
      height: 380px;
      background-color: transparent;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
      overflow: hidden;
      transform: translateY(0);
    }

    /* 圖片設定 */
    .card-bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    /* 貴賓姓名 */
    .recipient-name {
      position: absolute;
      top: 25px;
      left: 20px;
      right: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      text-align: left;
      z-index: 2;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    /* 點擊提示 */
    .click-hint {
      position: absolute;
      bottom: -40px;
      width: 100%;
      text-align: center;
      color: #666;
      font-size: 14px;
      transition: opacity 0.3s;
    }

    /* --- 開啟狀態 --- */
    .envelope-wrapper.open {
      transform: translate(-50%, calc(-50% + 90px));
    }

    .envelope-wrapper.open .lid {
      transform: rotateX(180deg);
      z-index: 0;
    }

    .envelope-wrapper.open .card {
      transform: translateY(-90px) scale(1.02);
      z-index: 4;
    }

    .envelope-wrapper.open .click-hint {
      opacity: 0;
    }

    /* --- 內建彩帶特效 CSS --- */
    .confetti-particle {
      position: fixed;
      width: 10px;
      height: 14px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 2px;
      animation: confettiFall 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) rotate(720deg) scale(0.6);
      }
    }
  </style>
</head>
<body>

  <!-- 純粹熱烈拍手聲 -->
  <audio id="applauseSound" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3" preload="auto"></audio>

  <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
    <div class="lid"></div>
    <div class="pocket"></div>
    
    <div class="card">
      <div class="recipient-name" id="nameTag">親愛的貴賓：</div>
      <img src="card.jpg" class="card-bg" alt="賀函圖片">
    </div>

    <div class="click-hint">▲ 點擊信封開啟賀函 ▲</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name');

    if (rawName) {
      document.getElementById('nameTag').innerText = decodeURIComponent(rawName) + ' 您好：';
    }

    let isOpened = false;

    function openEnvelope() {
      if (!isOpened) {
        // 1. 播放純拍手聲
        const sound = document.getElementById('applauseSound');
        if (sound) {
          sound.currentTime = 0;
          sound.play().catch(e => console.log('Audio blocked:', e));
        }

        // 2. 開啟信封動畫
        document.getElementById('envelope').classList.add('open');

        // 3. 啟動內建彩帶噴發
        createConfetti();

        isOpened = true;
      }
    }

    // 手寫純 JS 彩帶生成器
    function createConfetti() {
      const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#00bcd4', '#4caf50', '#ffeb3b', '#ff9800'];
      const totalCount = 70; // 彩帶數量

      for (let i = 0; i < totalCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'confetti-particle';
        
        // 隨機顏色
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        // 起始位置（從信封中心噴發）
        const startX = window.innerWidth / 2;
        const startY = window.innerHeight / 2 + 50;
        particle.style.left = startX + 'px';
        particle.style.top = startY + 'px';

        // 隨機噴發角度與距離
        const angle = Math.random() * Math.PI * 2;
        const distance = 150 + Math.random() * 300;
        const dx = Math.cos(angle) * distance + 'px';
        const dy = (Math.sin(angle) * distance - 100) + 'px'; // 稍微向上弧形飛散

        particle.style.setProperty('--dx', dx);
        particle.style.setProperty('--dy', dy);

        document.body.appendChild(particle);

        // 動畫結束後自動清除
        setTimeout(() => particle.remove(), 2500);
      }
    }
  </script>
</body>
</html>
